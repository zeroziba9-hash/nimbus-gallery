<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#0f0f13"/>

  <!-- Title -->
  <text x="450" y="40" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">☁️ Nimbus Gallery — AWS Architecture</text>

  <!-- CLIENT -->
  <rect x="30" y="200" width="110" height="60" rx="10" fill="#1e1b2e" stroke="#6c63ff" stroke-width="2"/>
  <text x="85" y="226" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">Client</text>
  <text x="85" y="244" fill="#9d8ff5" font-size="10" text-anchor="middle">Browser</text>

  <!-- Arrow: Client → API Server -->
  <line x1="140" y1="230" x2="195" y2="230" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="167" y="222" fill="#888" font-size="9" text-anchor="middle">REST API</text>

  <!-- API SERVER -->
  <rect x="195" y="200" width="120" height="60" rx="10" fill="#1e1b2e" stroke="#6c63ff" stroke-width="2"/>
  <text x="255" y="226" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">API Server</text>
  <text x="255" y="244" fill="#9d8ff5" font-size="10" text-anchor="middle">FastAPI / EC2</text>

  <!-- Arrow: API → S3 -->
  <line x1="315" y1="230" x2="375" y2="230" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="345" y="222" fill="#888" font-size="9" text-anchor="middle">Presigned URL</text>

  <!-- S3 -->
  <rect x="375" y="200" width="110" height="60" rx="10" fill="#1e1b2e" stroke="#f90" stroke-width="2"/>
  <text x="430" y="226" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">S3</text>
  <text x="430" y="244" fill="#f90" font-size="10" text-anchor="middle">Image Storage</text>

  <!-- Arrow: S3 → Lambda (down) -->
  <line x1="430" y1="260" x2="430" y2="320" stroke="#f90" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="468" y="296" fill="#888" font-size="9">S3 Event</text>

  <!-- LAMBDA -->
  <rect x="375" y="320" width="110" height="60" rx="10" fill="#1e1b2e" stroke="#f90" stroke-width="2"/>
  <text x="430" y="346" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">Lambda</text>
  <text x="430" y="364" fill="#f90" font-size="10" text-anchor="middle">Worker</text>

  <!-- Arrow: Lambda → Rekognition -->
  <line x1="485" y1="350" x2="545" y2="350" stroke="#f90" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="515" y="342" fill="#888" font-size="9" text-anchor="middle">AI 분석</text>

  <!-- REKOGNITION -->
  <rect x="545" y="320" width="120" height="60" rx="10" fill="#1e1b2e" stroke="#00bcd4" stroke-width="2"/>
  <text x="605" y="346" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">Rekognition</text>
  <text x="605" y="364" fill="#00bcd4" font-size="10" text-anchor="middle">AI Auto Tagging</text>

  <!-- Arrow: Lambda → Thumbnail → S3 (back up) -->
  <line x1="430" y1="320" x2="430" y2="270" stroke="#aaa" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow3)"/>

  <!-- Arrow: Lambda → DynamoDB -->
  <line x1="430" y1="380" x2="430" y2="430" stroke="#f90" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- DYNAMODB -->
  <rect x="375" y="430" width="110" height="60" rx="10" fill="#1e1b2e" stroke="#00bcd4" stroke-width="2"/>
  <text x="430" y="456" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">DynamoDB</text>
  <text x="430" y="474" fill="#00bcd4" font-size="10" text-anchor="middle">Metadata + Tags</text>

  <!-- Arrow: Client → CloudFront -->
  <line x1="85" y1="200" x2="85" y2="130" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="85" y1="130" x2="705" y2="130" stroke="#6c63ff" stroke-width="1.5"/>
  <line x1="705" y1="130" x2="705" y2="160" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="118" fill="#888" font-size="9" text-anchor="middle">이미지 조회 (CDN)</text>

  <!-- CLOUDFRONT -->
  <rect x="645" y="160" width="120" height="60" rx="10" fill="#1e1b2e" stroke="#6c63ff" stroke-width="2"/>
  <text x="705" y="186" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">CloudFront</text>
  <text x="705" y="204" fill="#9d8ff5" font-size="10" text-anchor="middle">CDN + HTTPS</text>

  <!-- Arrow: CloudFront → S3 -->
  <line x1="705" y1="220" x2="705" y2="260" stroke="#6c63ff" stroke-width="1.5"/>
  <line x1="705" y1="260" x2="490" y2="260" stroke="#6c63ff" stroke-width="1.5"/>
  <line x1="490" y1="260" x2="490" y2="245" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CLOUDWATCH -->
  <rect x="645" y="320" width="120" height="60" rx="10" fill="#1e1b2e" stroke="#4caf50" stroke-width="2"/>
  <text x="705" y="346" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">CloudWatch</text>
  <text x="705" y="364" fill="#4caf50" font-size="10" text-anchor="middle">Logs + Monitor</text>

  <!-- Thumbnail label -->
  <text x="395" y="298" fill="#aaa" font-size="9" text-anchor="middle">썸네일 저장</text>

  <!-- Legend -->
  <rect x="30" y="430" width="12" height="12" rx="2" fill="#6c63ff"/>
  <text x="48" y="441" fill="#888" font-size="10">업로드 / 조회 흐름</text>
  <rect x="30" y="452" width="12" height="12" rx="2" fill="#f90"/>
  <text x="48" y="463" fill="#888" font-size="10">이벤트 드리븐 처리</text>
  <rect x="30" y="474" width="12" height="12" rx="2" fill="#00bcd4"/>
  <text x="48" y="485" fill="#888" font-size="10">AI / 데이터 저장</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c63ff"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f90"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
  </defs>
</svg>
