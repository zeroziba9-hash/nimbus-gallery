name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 116137269423.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: nimbus-gallery
  EC2_HOST: 3.34.44.85
  EC2_USER: ubuntu

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker build -t $IMAGE_URI ./backend
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Get ECR login password
        id: ecr-password
        run: echo "password=$(aws ecr get-login-password --region $AWS_REGION)" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_PASSWORD,IMAGE_URI
          script: |
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin 116137269423.dkr.ecr.ap-northeast-2.amazonaws.com
            docker pull $IMAGE_URI
            docker stop nimbus-api || true
            docker rm nimbus-api || true
            docker run -d \
              --name nimbus-api \
              --restart always \
              -p 8000:8000 \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              $IMAGE_URI
        env:
          ECR_PASSWORD: ${{ steps.ecr-password.outputs.password }}
          IMAGE_URI: ${{ env.IMAGE_URI }}
